on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, edited]
  merge_group:

name: Commit Checks
jobs:
  changelog:
    name: Changelog Entry
    if: >-
      github.event_name == 'pull_request' &&
      !contains(fromJSON('["renovate[bot]", "dependabot[bot]"]'), github.event.pull_request.user.login)
    runs-on: ubuntu-latest
    steps:
      - name: Check for a CHANGELOG.md entry or opt-out checkbox
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          CHANGED_FILES="$(gh pr diff "$PR_NUMBER" --repo "$REPO" --name-only)"

          if printf '%s\n' "$CHANGED_FILES" | grep -qx "CHANGELOG.md"; then
            echo "CHANGELOG.md was updated in this PR."
            exit 0
          fi

          if ! printf '%s\n' "$CHANGED_FILES" | grep -qvE '^docs/'; then
            echo "This PR only touches docs/, no changelog entry required."
            exit 0
          fi

          if printf '%s\n' "$PR_BODY" | grep -qiE '^\s*-\s*\[[xX]\]\s*a changelog\.md entry is not needed'; then
            echo "PR description confirms a changelog entry is not needed."
            exit 0
          fi

          echo "::error::This PR doesn't modify CHANGELOG.md. Add an entry under 'Unreleased' (see CONTRIBUTING.md), or check the 'A CHANGELOG.md entry is not needed for this PR' box in the PR description."
          exit 1

  cargo-deny:
    name: Cargo Deny
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: false
        env:
          CARGO_NET_RETRY: "5"
      - name: Install mise tools
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          max_attempts: 3
          timeout_minutes: 10
          command: mise install
      - run: mise run cargo-deny

  fmt:
    name: Format
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
    - name: Install nightly@nightly toolchain
      uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
      with:
        toolchain: nightly
        components: rustfmt
    - name: Format
      run: cargo +nightly fmt --all -- --check

  clippy:
    name: Clippy
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
    - name: Install stable@stable toolchain
      uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
      with:
        components: clippy
    - name: Run Clippy
      run: cargo clippy --locked --workspace --all-features --all-targets

  test_installers:
    needs: test
    strategy:
      matrix:
        runner: [ubuntu-latest, macos-latest, windows-latest]
        package_manager: [npm, npm_global, pnpm]
        include:
          - runner: ubuntu-latest
            pkg: rover-linux-x64
            target: x86_64-unknown-linux-gnu
          - runner: macos-latest
            pkg: rover-darwin-arm64
            target: aarch64-apple-darwin
          - runner: windows-latest
            pkg: rover-win32-x64
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        env:
          CARGO_NET_RETRY: "5"
      - uses: ./.github/actions/download-artifact-with-retry
        with:
          name: installer-binary-${{ matrix.pkg }}
          path: target/${{ matrix.target }}/release
      - run: cargo npm generate --target ${{ matrix.target }}
      - run: node .mise/scripts/patch-npm-shim.js
      - if: runner.os != 'Windows'
        run: chmod +x installers/npm/@apollo/${{ matrix.pkg }}/rover
      - run: mise run install_${{ matrix.package_manager }}
        env:
          PLATFORM_PKG: ${{ matrix.pkg }}
          ROVER_PACKAGES_BASE: ${{ github.workspace }}

  test:
    if: github.event.action != 'edited'
    strategy:
      matrix:
        runner: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - runner: ubuntu-latest
            pkg: rover-linux-x64
            binary_path: target/x86_64-unknown-linux-musl/debug/rover
          - runner: macos-latest
            pkg: rover-darwin-arm64
            binary_path: target/debug/rover
          - runner: windows-latest
            pkg: rover-win32-x64
            binary_path: target/debug/rover.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        env:
          CARGO_NET_RETRY: "5"
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          # This is how we test with musl linux. We check the glibc version in the `check_minimal_glibc` job
          target: ${{ matrix.runner == 'ubuntu-latest' && 'x86_64-unknown-linux-musl' || '' }}
      - if: ${{ matrix.runner == 'ubuntu-latest' }}
        name: Install musl-tools for cross-compiling
        run: sudo apt-get install --yes --no-install-recommends musl-tools
      - run: mise run test ${{ matrix.runner == 'ubuntu-latest' && ' --target x86_64-unknown-linux-musl' || '' }}
      - uses: ./.github/actions/upload-artifact-with-retry
        with:
          name: installer-binary-${{ matrix.pkg }}
          path: ${{ matrix.binary_path }}


  test_minimal_glibc:
    name: Test with minimal glibc versions
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    container: ghcr.io/apollographql/ci-utility-docker-images/apollo-rust-builder:0.30.10

    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
        ref: ${{ github.head_ref || github.ref_name }}
    - name: Fix git ownership
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
    - name: Debug git state
      run: |
        git status
        git branch -a
        git log --oneline -1
        git symbolic-ref HEAD || echo "Detached HEAD detected"
    - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
    - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      with:
        install: false
      env:
        CARGO_NET_RETRY: "5"
    - name: Install mise tools
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
      with:
        max_attempts: 3
        timeout_minutes: 30
        command: mise install
    - run: mise run test
    - run: mise run check-glibc
