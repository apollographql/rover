name: Verify Agentic Workflow Lock

# Fails any PR whose generated *.lock.yml is out of sync with its .md source / the
# pinned gh-aw version, so a stale lock can't be merged.
#
# Renovate bumps the github/gh-aw action pin but can't recompile the lock, and the
# generated *.lock.yml files live under .github/workflows/ — which GitHub forbids
# any Actions/App token lacking the `workflows` permission from pushing. Rather
# than provision such a token, recompiling is a manual step: when this check fails
# (on a Renovate or any other PR), run the command from the error message locally
# and commit the result.

on:
  pull_request:
    paths:
      - ".github/workflows/**.lock.yml"
      - ".github/workflows/**.md"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve gh-aw version from the action pin
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          # The version tag only lives in the Renovate-maintained comment on the
          # gh-aw setup action; the uses: value is a SHA and --pin needs a tag.
          mapfile -t versions < <(
            grep -rhE 'uses:[[:space:]]*github/gh-aw/actions/setup@[0-9a-f]+[[:space:]]*#[[:space:]]*v[0-9]+\.[0-9]+\.[0-9]+' \
              .github/workflows/*.lock.yml \
              | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | sort -u
          )
          case "${#versions[@]}" in
            0) echo "No github/gh-aw setup pin found; nothing to verify."; echo "skip=true" >> "$GITHUB_OUTPUT" ;;
            1) echo "version=${versions[0]}" >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::Lock files pin conflicting gh-aw versions: ${versions[*]}"; exit 1 ;;
          esac

      - name: Install gh-aw CLI matching the action pin
        if: steps.ver.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install github/gh-aw --pin "${{ steps.ver.outputs.version }}"

      - name: Recompile and check for drift
        if: steps.ver.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh aw compile
          if ! git diff --exit-code -- .github/workflows; then
            echo "::error::Agentic workflow lock is out of date for gh-aw ${{ steps.ver.outputs.version }}. Recompile locally with the matching CLI and commit the updated .github/workflows/*.lock.yml: 'gh extension install github/gh-aw --pin ${{ steps.ver.outputs.version }} && gh aw compile'"
            exit 1
          fi
