name: 'Download artifact with retry'
description: >-
  Wraps actions/download-artifact with up to 3 attempts so that transient
  GitHub-side failures do not fail the job. Inputs mirror actions/download-artifact@v8.

inputs:
  name:
    description: 'Artifact name'
    required: true
  path:
    description: 'Destination path'
    required: false

runs:
  using: composite
  steps:
    - name: 'Download artifact (attempt 1)'
      id: download1
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      continue-on-error: true
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}

    - name: 'Wait before retry 1'
      if: steps.download1.outcome == 'failure'
      shell: bash
      run: |
        echo "Download attempt 1 failed (likely a transient GitHub Actions infra error). Sleeping 30s before retry."
        sleep 30

    - name: 'Download artifact (attempt 2)'
      id: download2
      if: steps.download1.outcome == 'failure'
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      continue-on-error: true
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}

    - name: 'Wait before retry 2'
      if: steps.download1.outcome == 'failure' && steps.download2.outcome == 'failure'
      shell: bash
      run: |
        echo "Download attempt 2 failed. Sleeping 60s before final retry."
        sleep 60

    - name: 'Download artifact (attempt 3, final)'
      if: steps.download1.outcome == 'failure' && steps.download2.outcome == 'failure'
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
