[settings]
idiomatic_version_file_enable_tools = ["rust"]

[tools]
"cargo:lychee" = "0.24.2"
node = "24.18.0"
"npm:npm" = "12.0.1"
"cargo:cargo-deny" = "0.20"
"cargo:graphql_client_cli" = "0.16.0"
"cargo:cargo-npm" = "0.1.2"

[tasks.check]
description = "Run the same checks as CI"
depends = ["clippy", "format-check", "test"]

[tasks.prep]
description = "Prepare a release: regenerate template schemas/queries and bump the npm installer version"
run = "cargo xtask prep"

[tasks.format-check]
run = "cargo +nightly fmt --all -- --check"

[tasks.clippy]
run = "cargo clippy --locked --workspace --all-features --all-targets"

[tasks.test]
run = "cargo test --locked --workspace --exclude regressions"

[tasks.generate-npm]
description = "Generate npm packages via cargo-npm and patch the shim"
run = """
cargo npm generate
node .mise/scripts/patch-npm-shim.js
"""

[tasks.install_npm]
run = "bash .mise/scripts/install_npm.sh"

[tasks.install_npm_global]
run = "bash .mise/scripts/install_npm_global.sh"

[tasks.install_pnpm]
run = "bash .mise/scripts/install_pnpm.sh"

[tasks.cargo-deny]
run = "cargo deny check"
